id: do_pfn_v0_1
description: |
  v0.1 — CID + CATE recovery on Do-PFN random-DAG SCM tasks. Paper-faithful
  axial-attention transformer (d_model=192, 12 layers), 12000 steps, AdamW +
  grad clip. Single-GPU reproduction of the CID-prediction mechanism; the
  paper's headline runs use a larger model + millions of DGPs.
prior:
  id: do_pfn_scm
  version: 0.1.0
model:
  id: do_pfn
  version: 0.1.0
evals:
  - id: cid_recovery
    version: 0.1.0
hyperparams:
  optimizer: adamw
  lr: 5.0e-4
  batch_size: 32
  steps: 12000
  weight_decay: 1.0e-5
  clip_grad_norm: 1.0
  seed: 42
compute:
  target: vast
tracking: {}
