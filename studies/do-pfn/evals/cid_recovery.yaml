id: cid_recovery
name: CID + CATE recovery — Do-PFN vs naive vs oracle
version: 0.1.0
task: cate
description: 50 fresh DGPs from the same prior. Scores both interventional outcome prediction (CID-MSE) and derived CATE (paired do(0)/do(1) queries) against the SCM's ground-truth Y_int and latent CATE. Compared to per-task ridge regression (biased baseline) and the oracle.
dataset:
  name: synthetic_fresh_prior_draws
  source: priors/do_pfn_scm_studio
  version: 0.1.0
  split: test
metrics:
  - name: cid_mse
    higher_is_better: false
    description: PFN interventional outcome vs oracle Y_int
  - name: cate_mse
    higher_is_better: false
    description: PFN-derived CATE vs latent CATE
  - name: naive_cate_mse
    higher_is_better: false
    description: Per-task ridge baseline — biased under confounding
  - name: oracle_cate_mse
    higher_is_better: false
    description: Latent CATE — MC-integration floor
  - name: ratio_vs_naive_cate
    higher_is_better: true
    description: naive_cate_mse / cate_mse — beats-naive multiplier
  - name: ratio_vs_oracle_cate
    higher_is_better: false
    description: cate_mse / oracle_cate_mse — closeness to perfect causal recovery
  - name: ate_error
    higher_is_better: false
    description: "|mean model CATE − mean latent CATE| — average treatment-effect bias"
baselines:
  - name: naive (per-task ridge)
    score: 0
    source: fitted_per_task
  - name: oracle (latent CATE)
    score: 0
    source: monte_carlo
citations:
  - robertson2025dopfn
