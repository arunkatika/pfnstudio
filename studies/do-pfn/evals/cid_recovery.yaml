id: cid_recovery
name: CID + CATE recovery — Do-PFN vs naive vs oracle
version: 0.1.0
task: estimation
description: 50 fresh DGPs from the same prior. Scores interventional outcome prediction (CID-MSE, range-normalized CID-NMSE) and derived CATE (paired do(0)/do(1) queries) against the SCM's ground-truth Y_int and a Monte-Carlo oracle CATE E[Y|do(1),X]-E[Y|do(0),X]. Also reports PICP (90% predictive-interval coverage) for the bar head's uncertainty. Compared to a per-task ridge baseline (biased under confounding) and the oracle floor.
dataset:
  name: synthetic_fresh_prior_draws
  source: priors/do_pfn_scm
  version: 0.1.0
  split: test
metrics:
  - name: cid_mse
    higher_is_better: false
    description: PFN interventional outcome vs oracle Y_int
  - name: cid_nmse
    higher_is_better: false
    description: Range-normalized CID MSE (the paper's primary metric)
  - name: cate_mse
    higher_is_better: false
    description: PFN-derived CATE vs Monte-Carlo oracle CATE
  - name: cate_nmse
    higher_is_better: false
    description: Range-normalized CATE MSE
  - name: naive_cate_mse
    higher_is_better: false
    description: Per-task ridge baseline — biased under confounding
  - name: oracle_cate_mse
    higher_is_better: false
    description: MC oracle vs itself — the achievable floor (0)
  - name: ratio_vs_naive_cate
    higher_is_better: true
    description: naive_cate_mse / cate_mse — beats-naive multiplier
  - name: ratio_vs_oracle_cate
    higher_is_better: false
    description: absolute CATE MSE vs the MC oracle — closeness to perfect causal recovery
  - name: ate_error
    higher_is_better: false
    description: "|mean model CATE − mean oracle CATE| — average treatment-effect bias"
  - name: picp_90
    higher_is_better: false
    description: Central-90% predictive-interval coverage of the bar head (target 0.90)
  - name: picp_90_gap
    higher_is_better: false
    description: "|picp_90 − 0.90| — calibration error (lower = better)"
baselines:
  - name: naive (per-task ridge)
    score: 0
    source: fitted_per_task
  - name: oracle (MC CATE)
    score: 0
    source: monte_carlo
citations:
  - robertson2025dopfn
