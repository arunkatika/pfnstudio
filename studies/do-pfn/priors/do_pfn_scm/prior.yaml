id: do_pfn_scm
name: Do-PFN SCM prior (Robertson et al., 2025)
version: 0.1.0
kind: tabular
description: |
  Synthetic SCM prior for in-context interventional outcome prediction.
  Each sample is one DGP — a draw from a structural causal model with:

    X  ~ N(0, Σ_d)          ← d observed covariates with correlated structure
    U  ~ N(0, 1)            ← unobserved confounder coupled into both T and Y
    π(X, U)  = sigmoid(MLP_T(X, U))                 ← propensity
    T  ~ Bernoulli(π(X, U))
    Y0       = MLP_Y(X, 0, U) + ε                   ← potential outcome | do(T=0)
    Y1       = MLP_Y(X, 1, U) + ε                   ← potential outcome | do(T=1)
    Y        = T · Y1 + (1 - T) · Y0                ← observed
    CID(t)   = p(Y | do(T=t), X)                    ← interventional dist.
    CATE     = E_U[Y1 - Y0 | X]                     ← treatment effect

  Each task is packed as a (context, query) sequence the transformer
  attends across. Context tokens carry the OBSERVATIONAL distribution
  (X, T, Y); query tokens carry X and the desired intervention t. The
  trainer's target is the INTERVENTIONAL outcome Y under that
  intervention — drawn cleanly from the SCM (the observed Y_obs is
  used only at context positions).

  Key paper claim — the model learns to predict CIDs from observational
  data alone, without being shown the causal graph. v0.1 of this prior
  encodes the simplest faithful version of that claim.

  Cited:
    Robertson, J., Reuter, A., Guo, S., Hollmann, N., Hutter, F.,
    Schölkopf, B. (2025). Do-PFN: In-Context Learning for Causal Effect
    Estimation. NeurIPS 2025. arXiv:2506.06039

parameters:
  num_features:
    type: int
    range: [10, 10]
    description: Dimension d of the observed covariate X.
  num_samples:
    type: int
    range: [256, 256]
    description: Points per task (context + query, packed in one sequence).
  ctx_frac:
    type: float
    range: [0.75, 0.75]
    description: Fraction used as context; the rest are intervention queries.
  outcome_hidden:
    type: int
    range: [32, 32]
    description: Width of the outcome MLP's hidden layer.
  propensity_hidden:
    type: int
    range: [16, 16]
    description: Width of the propensity MLP's hidden layer.
  u_strength:
    type: float
    range: [0.5, 2.0]
    description: |
      Per-task confounding magnitude — drawn uniform so the model sees
      a range of confounding regimes (the paper's "varying base rates").
  cov_correlation:
    type: float
    range: [0.0, 0.5]
    description: |
      Block-correlation strength for X. Real-world covariates aren't
      independent; the paper trains across a distribution of
      correlation regimes.
  noise_scale:
    type: float
    range: [0.1, 0.3]
    description: Std-dev of observation noise on Y.
  intervention_t:
    type: float
    range: [0.0, 1.0]
    description: |
      Per-query intervention value. Binary (0 or 1) at sample time,
      drawn 50/50 unless overridden by the trainer for paired-query
      evaluation.

outputs:
  variables:
    - name: X
      type: tensor
      shape: "(N, d+3)"
      description: |
        Packed token = (x_1, ..., x_d, t_or_intervention, y_obs_or_0, is_context_flag).
        Context tokens carry observed T and Y; query tokens carry the
        DESIRED intervention t and have y masked to 0 + is_context_flag=0.
    - name: y
      type: tensor
      shape: "(n_query,)"
      description: |
        Target interventional outcome at the query positions —
        Y_{do(T=t)} drawn cleanly from the SCM. The model's job is to
        predict this from the observational context alone.
    - name: n_ctx
      type: scalar
      description: Boundary index — the default training step slices logits here.
    - name: cate_true
      type: tensor
      shape: "(num_samples,)"
      description: |
        Latent CATE for every point in the task — convenience field for
        eval; not the training target (the target is the chosen-
        intervention Y, not the CATE difference).
    - name: u_strength
      type: scalar
      description: Per-task confounding strength — useful for stratified eval.

citations:
  - robertson2025dopfn

implementation: prior.py
