id: do_pfn_scm
name: Do-PFN SCM prior
version: 0.1.0
kind: scm
description: Random-DAG structural causal model (paper-faithful, Robertson et al. 2025). Samples a fresh DAG per task, picks a treatment node with descendants as the outcome, binarizes treatment, and emits packed (context, query) tokens where context carries observational (X, T_obs, Y_obs) and query carries (X, t_intervention, masked). Training target is the interventional outcome Y under do(T=t_query).
parameters:
  num_features:
    type: int
    range:
      - 6
      - 6
    description: Dimension d of observed covariate X (columns 0..d-1).
  num_samples:
    type: int
    range:
      - 2200
      - 2200
    description: Points per task (context + query).
  ctx_frac:
    type: float
    range:
      - 0.75
      - 0.75
    description: Fraction of points used as context; the rest are queries.
  num_unobserved:
    type: int
    range:
      - 1
      - 1
    description: Latent (unobserved) confounder nodes added to the DAG.
  K_max:
    type: int
    range:
      - 10
      - 10
    description: Cap on total DAG nodes K = num_features + num_unobserved + 2.
  min_ctx:
    type: int
    range:
      - 10
      - 10
    description: Lower bound when varying context length per batch.
  max_retries:
    type: int
    range:
      - 5
      - 5
    description: Resamples if a drawn DAG yields a degenerate (non-finite) task.
  num_features_min:
    type: int
    range:
      - 1
      - 1
    description: Lower bound when varying feature count per batch.
  num_features_max:
    type: int
    range:
      - 6
      - 6
    description: Upper bound when varying feature count per batch.
outputs:
  variables:
    - name: X
      type: tensor
      shape: (N, d+2)
      description: "Col 0 = treatment t (0/1), cols 1..d = covariates, col d+1 = y (real on context rows, NaN on query rows for in-context learning). Layout: [t, x_1..x_d, y]."
    - name: y
      type: tensor
      shape: (N - n_ctx,)
      description: Loss target — true interventional outcome at QUERY positions only. The trainer's regression branch reads n_qry from this field's length and slices the model output to match. Context-position y values live inside X as the y-feature column (NaN at queries, so the preprocessor mean-imputes them — the in-context learning signal).
    - name: n_ctx
      type: scalar
      description: Boundary index — trainer threads as single_eval_pos to n_ctx-aware blocks (GridPreprocessor, AxialAttentionBlock) and slices logits here.
    - name: cate_true
      type: tensor
      shape: (num_samples,)
      description: "Ground-truth CATE for eval (NOT the training target). When sampled with oracle_mc>0 (the eval does), this is the Monte-Carlo oracle E[Y|do(1),X]-E[Y|do(0),X] integrated over the exogenous noise with covariates pinned per row. When oracle_mc=0 (train-time default, where cate_true is unused), it falls back to a single-draw interventional-minus-observational contrast — NOT the CATE. The prior inspector renders this as the headline histogram for causal_intervention priors."
    - name: adjacency
      type: tensor
      shape: (K, K)
      description: "Random DAG that generated this task — adj[i,j]=1 means node i → node j. Used by the prior-inspector's DAG view (expand-pane only). Inert during training: the trainer only consumes X / y / n_ctx / cate_true."
    - name: task_meta
      type: scalar
      description: "Per-task metadata dict: K (num nodes), num_features, num_unobserved, edge_density, p_edge, t_idx (treatment column), y_idx (outcome column), x_indices, sigma_exo, sigma_eps. Used by the inspector's caption + DAG view to highlight the treatment/outcome nodes."
citations:
  - robertson2025dopfn
