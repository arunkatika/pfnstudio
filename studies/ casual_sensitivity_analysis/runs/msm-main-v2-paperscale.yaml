id: msm-main-v2-paperscale
description: "PAPER-SCALE run. The authors trained on ~1B (query, Gamma, bound)
  pair- visits per bound (10,000 DGPs x 150 epochs). This run matches that
  budget with FRESH DGPs instead of reuse: 100,000 steps x 32 DGPs x 320 pairs
  per bound = ~1.02B pair-visits per bound, on 3.2M unique DGPs (320x the
  paper's DGP diversity). At the measured ~0.33 s/step with the v7/v8 parallel
  prior this is ~9-11 hours on one RTX 4090 (~$6). Snapshots at every eval; if
  loss plateaus early (compare evals ~2000 apart), it is safe to stop and take
  the latest snapshot. VERIFY at launch: \"[prior] parallel sampling: N fork
  workers\" (stderr) and N=1024 n_queries=32 n_gamma=5 in the params line."
prior:
  slug: causal_sensitivity_msm_analytical
model:
  slug: causal-sensitivity-flat-pfn
evals:
  - slug: causal-sensitivity-msm-bounds
hyperparams:
  lr: 0.001
  seed: 42
  steps: 100000
  clip_grad: 1
  batch_size: 32
  eval_every: 2000
compute:
  target: remote
  remote_host_name: vast-44554651
  remote_workspace: /workspace
  vast_instance_id: 44554651
  remote_ssh_endpoint: root@ssh6.vast.ai:34651
tracking: {}
