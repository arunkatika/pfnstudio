name: Publish to PyPI

# Publishes a package to PyPI when a version tag is pushed:
#   core-v0.9.0   -> publishes packages/core  (pfnstudio-core)
#   cli-v0.8.13   -> publishes packages/cli   (pfnstudio)
#
# Uses PyPI Trusted Publishing (OIDC) — no API token is stored in GitHub.
# One-time setup on PyPI (per project), Manage → Publishing → add a
# "Trusted Publisher":
#   Owner:        profitopsai
#   Repository:   pfnstudio
#   Workflow:     publish.yml
#   Environment:  pypi
# Do this for BOTH the `pfnstudio-core` and `pfnstudio` projects.

on:
  push:
    tags:
      - 'core-v*'
      - 'cli-v*'

jobs:
  publish:
    name: build + publish (${{ github.ref_name }})
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # required for Trusted Publishing
    steps:
      - uses: actions/checkout@v4

      - name: Resolve package from the tag
        id: pkg
        run: |
          case "${GITHUB_REF_NAME}" in
            core-v*) echo "dir=packages/core" >> "$GITHUB_OUTPUT" ;;
            cli-v*)  echo "dir=packages/cli"  >> "$GITHUB_OUTPUT" ;;
            *) echo "::error::Unrecognized tag '${GITHUB_REF_NAME}' (expected core-v* or cli-v*)"; exit 1 ;;
          esac

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify the tag matches the package version
        run: |
          ver=$(grep -m1 '^version = ' "${{ steps.pkg.outputs.dir }}/pyproject.toml" | sed 's/.*"\(.*\)".*/\1/')
          tag_ver="${GITHUB_REF_NAME##*-v}"
          echo "pyproject version: $ver | tag version: $tag_ver"
          if [ "$ver" != "$tag_ver" ]; then
            echo "::error::Tag version ($tag_ver) does not match pyproject version ($ver)"; exit 1
          fi

      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build "${{ steps.pkg.outputs.dir }}"

      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: ${{ steps.pkg.outputs.dir }}/dist
