id: causal-sensitivity-optimized-pfn
name: Causal Sensitivity Optimized PFN v1
version: 0.1.0
description: No blocks, no heads — start from scratch and stack what you need.
input_shape: null
blocks:
  - type: tabular_embedder
    config:
      d_model: 128
  - type: transformer_encoder
    config:
      d_model: 128
      n_heads: 4
      n_layers: 10
      dropout: 0.1
      ff_mult: 4
  - type: scalar_head
    name: upper_bound
    config:
      d_model: 128
      d_out: 1
  - type: scalar_head
    name: lower_bound
    config:
      d_model: 128
      d_out: 1
output_heads:
  - name: theta_star
    task: regression
citations: []
