[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "pfnstudio-core"
version = "0.9.2"
description = "Core abstractions for PFN Studio — Prior, Model, Eval, Run, and the block registry."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "Apache-2.0" }
authors = [{ name = "PFN Studio contributors" }]
classifiers = [
  "Development Status :: 3 - Alpha",
  "License :: OSI Approved :: Apache Software License",
  "Programming Language :: Python :: 3",
  "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
dependencies = [
  "pydantic>=2.6",
  "pyyaml>=6.0",
  "numpy>=1.26",
  # scikit-learn powers most of the eval suite (classification accuracy,
  # regression metrics, clustering, ...) and several priors (kernel
  # transforms, baseline OLS). Adding here so `pip install pfnstudio-core`
  # gives a working setup instead of erroring on the first eval import.
  "scikit-learn>=1.3",
  # pandas is used by tabular priors / evals for DataFrame manipulation.
  # Lighter than torch; bundling avoids "module not found" surprises mid-run.
  "pandas>=2.0",
]

[project.optional-dependencies]
torch = ["torch>=2.2"]
dev = ["pytest>=8.0", "pytest-cov>=5.0", "ruff>=0.4"]

[project.urls]
Homepage = "https://pfnstudio.com"
Repository = "https://github.com/profitopsai/pfnstudio"
Issues = "https://github.com/profitopsai/pfnstudio/issues"
Documentation = "https://github.com/profitopsai/pfnstudio/tree/main/docs"

[tool.hatch.build.targets.wheel]
packages = ["pfnstudio_core"]
