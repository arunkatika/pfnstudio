[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "pfnstudio-studio"
version = "0.7.0"
description = "Static-site Studio for PFN Studio — renders an FM project as a browsable web UI."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "Apache-2.0" }
authors = [{ name = "PFN Studio contributors" }]
classifiers = [
  "Development Status :: 3 - Alpha",
  "License :: OSI Approved :: Apache Software License",
  "Programming Language :: Python :: 3",
  "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
dependencies = [
  "jinja2>=3.1",
  "markdown>=3.5",
  "pyyaml>=6.0",
]

[project.urls]
Homepage = "https://pfnstudio.com"
Repository = "https://github.com/profitopsai/pfnstudio"
Issues = "https://github.com/profitopsai/pfnstudio/issues"
Documentation = "https://github.com/profitopsai/pfnstudio/tree/main/docs"

[tool.hatch.build.targets.wheel]
packages = ["pfnstudio_studio"]
artifacts = ["pfnstudio_studio/templates/**/*", "pfnstudio_studio/static/**/*"]
